name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test (guardrails + scoring)
        run: npm test

      - name: Build
        run: npm run build
        env:
          # The app builds with no external credentials (everything mocks).
          NEXT_PUBLIC_APP_URL: http://localhost:3000
